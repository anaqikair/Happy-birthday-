<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎂 Happy Birthday 🎂</h1>

    <p id="message">
      Dear Friend, tap the button below for your surprise!
    </p>

    <button onclick="showSurprise()">Open Surprise 🎁</button>

    <div id="surprise" class="hidden">
      <h2>🎉 Happy Birthday, NENEK! 🎉</h2>
      <p>
        May your birthday be filled with happiness, laughter, and wonderful memories.
        You are amazing and deserve the best day ever!
      </p>

      <div class="cake">🎂</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
